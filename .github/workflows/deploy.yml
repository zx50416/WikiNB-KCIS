name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # 瀏覽器用的 Auth URL（本機測：localhost；遠端再改成公開 Auth）
          PUBLIC_AUTH_URL: ${{ vars.PUBLIC_AUTH_URL || 'http://127.0.0.1:8790' }}
          PUBLIC_AUTH_PRODUCTION_URL: ${{ vars.PUBLIC_AUTH_PRODUCTION_URL || '' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
